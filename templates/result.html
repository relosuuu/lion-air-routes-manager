<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <style>
        body { font-family: Arial; background: #111; color: #eee; }
        .box { width: 600px; margin: 50px auto; padding: 20px; background: #1c1c1c; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #333; padding: 8px; text-align: left; }
    </style>
</head>
<body>
<div class="box">
    <h2>Flight Sequence</h2>

    <table>
        <tr>
            <th>From</th>
            <th>To</th>
            <th>Aircraft</th>
            <th>Time</th>
        </tr>
        {% for f in flights %}
        <tr>
            <td>{{ f.from }}</td>
            <td>{{ f.to }}</td>
            <td>{{ f.aircraft }}</td>
            <td>{{ f.time }}</td>
        </tr>
        {% endfor %}
    </table>

    {% if total_time %}
        <p><strong>Total Time:</strong> {{ total_time }}</p>
    {% endif %}

    <a href="/">← Back</a>
</div>
</body>
</html>
