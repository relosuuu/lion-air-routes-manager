<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Route Generator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

<header class="topbar">
  <div class="nav-left">
    <a href="{{ url_for('airline_page', airline=airline) }}" class="back-btn">←</a>
    <a href="{{ url_for('index') }}" class="brand">
      <img src="{{ url_for('static', filename='assets/logo.webp') }}" alt="Lion Group VA">
      <div class="brand-text">
        <strong>Lion Group VA</strong>
        <span id="pageSubtitle"></span>
      </div>
    </a>
  </div>
</header>

<main class="container">

  <div class="form-card">
    <h1 id="formTitle"></h1>

    <form method="POST" action="{{ url_for('generate') }}">
      <input type="hidden" name="airline" value="{{ airline }}">
      <input type="hidden" name="type" value="{{ route_type }}">

      <label>Departure Airport (ICAO)</label>
      <input type="text" name="departure" placeholder="e.g. WIII or 'auto'" required>

      {% if route_type == "single" %}
      <div>
        <label>Select Aircraft Type</label>
        <select name="aircraft" required>
          <option value="">-- Choose Aircraft --</option>
          {% for ac in aircraft_list %}
            <option value="{{ ac }}">{{ ac }}</option>
          {% endfor %}
        </select>
      </div>
      {% endif %}

      <button type="submit" class="primary-btn">Generate Route</button>
    </form>
  </div>

  {% if result %}
  <div class="result-card">
    <h2>Generated Route</h2>
    <pre>{{ result }}</pre>
  </div>

  {% if map_legs and map_legs != '[]' %}
  <div class="map-card">
    <h2>Route Map</h2>
    <div id="routeMap"></div>
  </div>

  <script>
    const airports = {{ map_airports|safe }};
    const legs = {{ map_legs|safe }};

    const map = L.map('routeMap');

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // Draw route lines with arrows feel (dashed for multi-leg)
    legs.forEach((leg, i) => {
      L.polyline(leg, {
        color: '#e11d48',
        weight: 2.5,
        opacity: 0.8
      }).addTo(map);
    });

    // Draw numbered markers with ICAO labels
    const bounds = [];
    airports.forEach((ap, i) => {
      bounds.push([ap.lat, ap.lon]);

      const icon = L.divIcon({
        className: '',
        html: `<div class="map-marker">
                 <div class="marker-dot">${i + 1}</div>
                 <div class="marker-label">${ap.icao}</div>
               </div>`,
        iconAnchor: [14, 14]
      });

      L.marker([ap.lat, ap.lon], { icon }).addTo(map);
    });

    if (bounds.length > 0) {
      map.fitBounds(bounds, { padding: [50, 50] });
    }
  </script>
  {% endif %}
  {% endif %}

</main>

<script>
  const type = document.querySelector('input[name="type"]').value;
  const titles = {
    random: "Random Route Generator",
    single: "Single Aircraft Route Generator",
    mixed:  "Mixed Aircraft Route Generator"
  };
  document.getElementById("formTitle").textContent = titles[type] || "Route Generator";
  document.getElementById("pageSubtitle").textContent = titles[type] || "";
</script>

</body>
</html>
